name: Morning Interview Coach

on:
    schedule:
        # 한국 시간(KST) 09:30 = UTC 00:30 (분 시 일 월 요일 순서)
        - cron: "30 0 * * *"
    workflow_dispatch: # 직접 'Run' 버튼을 눌러 테스트할 수 있게 해줍니다.

jobs:
    build-and-run:
        runs-on: ubuntu-latest

        steps:
            - name: 코드 체크아웃
              uses: actions/checkout@v4

            - name: JDK 17 설정
              uses: actions/setup-java@v4
              with:
                  java-version: "17"
                  distribution: "temurin"

            - name: 빌드 및 실행
              # 모든 작업을 message 폴더 안에서 수행하도록 경로를 맞
              env:
                  OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
                  DISCORD_TOKEN: ${{ secrets.DISCORD_TOKEN }}
                  DISCORD_CHANNEL_ID: ${{ secrets.DISCORD_CHANNEL_ID }} # yml의 ${DISCORD_CHANNEL_ID}와 매칭
                  DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
                  PUBLIC_DATA_API_KEY: ${{ secrets.PUBLIC_DATA_API_KEY }}

                  SPRING_AI_OPENAI_API-KEY: ${{ secrets.OPENAI_API_KEY }}

                  DISCORD_CHANNEL: ${{ secrets.DISCORD_CHANNEL_ID }}
                  API_PUBLIC-DATA_URL: ${{ secrets.PUBLIC_DATA_API_KEY }}
              run: |
                  cd message
                  chmod +x gradlew
                  ./gradlew build -x test
                  java -jar build/libs/*[!plain].jar
